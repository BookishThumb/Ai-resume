kind = "web"
previewPath = "/"
title = "TalentAI"
version = "1.0.0"
id = "artifacts/talentai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21805

[services.development]
run = "pnpm --filter @workspace/talentai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/talentai", "run", "build" ]
publicDir = "artifacts/talentai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21805"
BASE_PATH = "/"
